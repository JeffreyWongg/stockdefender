<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Defender</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --card: #1a1a2e;
    --red: #c0392b;
    --blue: #2980b9;
    --gold: #f39c12;
    --green: #27ae60;
    --text: #e0e0e0;
    --muted: #888;
  }

  body {
    font-family: 'Special Elite', cursive;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, #12121f 0%, var(--bg) 100%);
    border-bottom: 2px solid #222;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(243,156,18,.35);
    display: flex; align-items: center; gap: 10px;
  }
  .logo span { font-size: 1.5rem; }
  .input-group { display: flex; gap: 10px; }
  #tickerInput {
    font-family: 'Special Elite', cursive;
    font-size: 1.1rem;
    padding: 9px 16px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #111;
    color: var(--gold);
    text-transform: uppercase;
    width: 150px;
    outline: none;
    transition: border-color .2s;
  }
  #tickerInput:focus { border-color: var(--gold); }
  #tickerInput::placeholder { color: #555; text-transform: none; }
  .btn {
    font-family: 'Special Elite', cursive;
    font-size: 1rem;
    padding: 9px 22px;
    border: 2px solid var(--gold);
    border-radius: 8px;
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--gold); color: #111; }

  /* ── Courtroom Stage ── */
  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      repeating-linear-gradient(
        90deg,
        #1a120b 0px, #1a120b 48px,
        #231a10 48px, #231a10 50px
      );
  }
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,15,.6) 0%, transparent 30%, transparent 65%, rgba(10,10,15,.7) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Characters ── */
  .character {
    position: absolute;
    bottom: 140px;
    width: 340px;
    z-index: 5;
    transition: transform .5s cubic-bezier(.22,.68,.36,1.1);
  }
  .character.prosecutor {
    left: 0;
    transform: translateX(-110%);
  }
  .character.prosecutor.on-stage {
    transform: translateX(0%);
  }
  .character.defense {
    right: 0;
    transform: translateX(110%);
  }
  .character.defense.on-stage {
    transform: translateX(0%);
  }

  .char-inner {
    padding: 24px 28px 32px;
    text-align: center;
  }
  .avatar {
    font-size: 10rem;
    line-height: 1;
    margin-bottom: 6px;
    filter: drop-shadow(0 4px 30px rgba(0,0,0,.6));
  }
  .char-name {
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .prosecutor .char-name { color: var(--red); }
  .defense .char-name    { color: var(--blue); }

  /* ── Dialogue Box (bottom of screen, Ace Attorney style) ── */
  .dialogue-box {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    z-index: 20;
    background: linear-gradient(180deg, rgba(10,10,20,.0) 0%, rgba(10,10,20,.95) 15%, #0d0d1a 100%);
    padding: 18px 30px 28px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .dialogue-box.visible {
    opacity: 1;
    pointer-events: all;
  }

  .speaker-tag {
    font-size: .95rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding: 3px 14px;
    display: inline-block;
    border-radius: 4px;
    width: fit-content;
  }
  .speaker-tag.prosecution {
    background: var(--red);
    color: #fff;
  }
  .speaker-tag.defense-tag {
    background: var(--blue);
    color: #fff;
  }
  .speaker-tag.judge-tag {
    background: var(--gold);
    color: #111;
  }

  .dialogue-text-box {
    background: var(--card);
    border: 2px solid #333;
    border-radius: 10px;
    padding: 18px 22px;
    min-height: 80px;
    position: relative;
  }
  .prosecution-border { border-left: 4px solid var(--red); }
  .defense-border     { border-left: 4px solid var(--blue); }
  .judge-border       { border-left: 4px solid var(--gold); }

  .dialogue-content {
    font-size: 1.15rem;
    line-height: 1.55;
    min-height: 1.5em;
  }

  .click-prompt {
    position: absolute;
    bottom: 8px;
    right: 14px;
    font-size: .75rem;
    color: var(--gold);
    animation: blink 1s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* ── OBJECTION! Flash ── */
  .objection-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.7);
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s;
  }
  .objection-overlay.flash {
    opacity: 1;
    animation: objFlash .7s ease forwards;
  }
  @keyframes objFlash {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .objection-text {
    font-size: 5rem;
    font-weight: bold;
    letter-spacing: 8px;
    text-transform: uppercase;
    animation: objShake .7s ease;
    text-shadow: 0 0 40px currentColor, 0 0 80px currentColor;
  }
  .objection-text.red  { color: var(--red); }
  .objection-text.blue { color: var(--blue); }

  @keyframes objShake {
    0%   { transform: scale(2.5) rotate(-3deg); opacity: 0; }
    15%  { transform: scale(1.1) rotate(1deg); opacity: 1; }
    25%  { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* ── Verdict Overlay ── */
  .verdict-overlay {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,.92);
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s;
  }
  .verdict-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .verdict-card {
    background: var(--card);
    border: 3px solid var(--gold);
    border-radius: 18px;
    padding: 36px 50px;
    text-align: center;
    max-width: 520px;
    width: 90%;
    transform: scale(.8);
    opacity: 0;
    box-shadow: 0 0 40px rgba(243,156,18,.12);
  }
  .verdict-card.show {
    animation: gavelBang .6s cubic-bezier(.17,.67,.32,1.3) forwards;
  }
  @keyframes gavelBang {
    0%   { opacity: 0; transform: scale(.8); }
    65%  { opacity: 1; transform: scale(1.12); }
    100% { opacity: 1; transform: scale(1); }
  }

  .verdict-label {
    font-size: .9rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .verdict-text {
    font-size: 3rem;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }
  .verdict-card.buy  .verdict-text { color: var(--green); text-shadow: 0 0 30px rgba(39,174,96,.5); }
  .verdict-card.hold .verdict-text { color: var(--gold);  text-shadow: 0 0 30px rgba(243,156,18,.5); }
  .verdict-card.avoid .verdict-text{ color: var(--red);   text-shadow: 0 0 30px rgba(192,57,43,.5); }
  .verdict-card.buy   { box-shadow: 0 0 60px rgba(39,174,96,.2); }
  .verdict-card.hold  { box-shadow: 0 0 60px rgba(243,156,18,.2); }
  .verdict-card.avoid { box-shadow: 0 0 60px rgba(192,57,43,.2); }

  .risk-badge {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: .85rem;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .risk-low    { background: rgba(39,174,96,.18); color: var(--green); border: 1px solid var(--green); }
  .risk-medium { background: rgba(243,156,18,.18); color: var(--gold); border: 1px solid var(--gold); }
  .risk-high   { background: rgba(192,57,43,.18); color: var(--red); border: 1px solid var(--red); }

  .summary {
    font-size: .95rem;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .gavel-quote {
    font-size: 1.15rem;
    color: var(--gold);
    min-height: 1.5em;
  }
  .gavel-quote::before { content: '⚖️ "'; }
  .gavel-quote::after  { content: '"'; }

  .verdict-restart {
    margin-top: 22px;
  }

  /* ── Loading overlay ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .overlay .spinner {
    font-size: 4rem;
    animation: spin 1.8s linear infinite;
    margin-bottom: 22px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay p {
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 2px;
  }

  /* ── Error ── */
  .error-msg {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(10,10,15,.9);
  }
  .error-msg.visible { display: flex; }
  .error-msg p { color: var(--red); font-size: 1.3rem; margin-bottom: 8px; }
  .error-msg .detail { color: var(--muted); font-size: .9rem; margin-bottom: 18px; }

  /* ── Welcome state ── */
  .welcome {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
  }
  .welcome .big-gavel {
    font-size: 5rem;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(243,156,18,.3));
  }
  .welcome h2 {
    color: var(--gold);
    font-size: 1.5rem;
    letter-spacing: 3px;
  }
  .welcome p {
    color: var(--muted);
    font-size: 1rem;
  }

  /* ── Responsive ── */
  /* ── Skip button ── */
  .skip-btn {
    position: absolute;
    top: 14px;
    right: 18px;
    z-index: 60;
    font-family: 'Special Elite', cursive;
    font-size: .85rem;
    padding: 7px 18px;
    border: 1px solid #555;
    border-radius: 6px;
    background: rgba(20,20,30,.85);
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    display: none;
  }
  .skip-btn:hover { border-color: var(--gold); color: var(--gold); }
  .skip-btn.visible { display: block; }

  @media (max-width: 700px) {
    .character { width: 220px; }
    .avatar { font-size: 6rem; }
    .objection-text { font-size: 3rem; }
    .dialogue-content { font-size: 1rem; }
    .header { padding: 12px 10px 10px; gap: 10px; }
    .logo { font-size: 1.3rem; }
    .verdict-card { padding: 24px 20px; }
    .verdict-text { font-size: 2.2rem; }
  }

  /* ── Screen shake ── */
  .shake {
    animation: screenShake .4s ease;
  }
  @keyframes screenShake {
    0%   { transform: translateX(0); }
    15%  { transform: translateX(-8px); }
    30%  { transform: translateX(8px); }
    45%  { transform: translateX(-5px); }
    60%  { transform: translateX(5px); }
    75%  { transform: translateX(-2px); }
    100% { transform: translateX(0); }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo"><span>⚖️</span> STOCK DEFENDER</div>
  <div class="input-group">
    <input type="text" id="tickerInput" placeholder="e.g. AAPL" maxlength="10" autocomplete="off">
    <button class="btn" id="submitBtn">Enter Courtroom</button>
  </div>
</div>

<!-- Loading overlay -->
<div class="overlay" id="overlay">
  <div class="spinner">⚖️</div>
  <p>Court is now in session...</p>
</div>

<!-- Stage -->
<div class="stage" id="stage">

  <!-- Welcome -->
  <div class="welcome" id="welcome">
    <div class="big-gavel">⚖️</div>
    <h2>Enter a Ticker to Begin the Trial</h2>
    <p>The courtroom awaits your case.</p>
  </div>

  <!-- Characters -->
  <div class="character prosecutor" id="prosecutorChar">
    <div class="char-inner">
      <div class="avatar">🧑‍⚖️</div>
      <div class="char-name">Prosecutor</div>
    </div>
  </div>
  <div class="character defense" id="defenseChar">
    <div class="char-inner">
      <div class="avatar">👨‍💼</div>
      <div class="char-name">Defense</div>
    </div>
  </div>

  <!-- Skip button -->
  <button class="skip-btn" id="skipBtn">⏩ Skip to Verdict</button>

  <!-- OBJECTION! overlay -->
  <div class="objection-overlay" id="objectionOverlay">
    <div class="objection-text" id="objectionText">OBJECTION!</div>
  </div>

  <!-- Dialogue box -->
  <div class="dialogue-box" id="dialogueBox">
    <div class="speaker-tag" id="speakerTag"></div>
    <div class="dialogue-text-box" id="dialogueTextBox">
      <div class="dialogue-content" id="dialogueContent"></div>
      <div class="click-prompt" id="clickPrompt">▼ CLICK TO CONTINUE</div>
    </div>
  </div>

  <!-- Verdict -->
  <div class="verdict-overlay" id="verdictOverlay">
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-label">⚖️ Judge's Verdict</div>
      <div class="verdict-text" id="verdictText"></div>
      <div class="risk-badge" id="riskBadge"></div>
      <div class="summary" id="summaryText"></div>
      <div class="gavel-quote" id="gavelQuote"></div>
      <div class="verdict-restart">
        <button class="btn" id="restartBtn">New Trial</button>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg">
    <p>⚠️ Order in the court!</p>
    <p class="detail" id="errorDetail"></p>
    <button class="btn" onclick="document.getElementById('errorMsg').classList.remove('visible')">Dismiss</button>
  </div>

</div>

<script>
  const API_KEY = 'AIzaSyCfVqHAwruTS8xnwPbr53gDNMeufP1vVtg';
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

  const $ = id => document.getElementById(id);

  // ── Gemini fetch ──
  async function askGemini(prompt) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  // ── Safe JSON parse ──
  function safeParse(raw) {
    let cleaned = raw.trim();
    cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '');
    return JSON.parse(cleaned.trim());
  }

  // ── Typewriter ──
  function typewriter(el, text, speed = 30) {
    return new Promise(resolve => {
      el.textContent = '';
      if (skipAll) { el.textContent = text; resolve(); return; }
      let i = 0;
      function tick() {
        if (skipAll || !isTyping) {
          el.textContent = text;
          resolve();
          return;
        }
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(tick, speed);
        } else resolve();
      }
      tick();
    });
  }

  // ── Dialogue system ──
  let dialogueResolve = null;
  let isTyping = false;
  let currentFullText = '';
  let skipAll = false;          // When true, skip entire dialogue sequence
  let skipResolve = null;       // Resolves when skip is triggered

  function waitForClick() {
    if (skipAll) return Promise.resolve();
    return new Promise(resolve => { dialogueResolve = resolve; });
  }

  // Click / key to advance
  document.addEventListener('click', advanceDialogue);
  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') advanceDialogue();
  });

  function advanceDialogue() {
    if (skipAll) return;
    if (isTyping) {
      // Skip typewriter — show full text immediately
      isTyping = false;
      $('dialogueContent').textContent = currentFullText;
      return;
    }
    if (dialogueResolve) {
      const r = dialogueResolve;
      dialogueResolve = null;
      r();
    }
  }

  // Show one dialogue line with typewriter
  async function showDialogue(speaker, text, borderClass, tagClass) {
    if (skipAll) return;

    const box = $('dialogueBox');
    const tag = $('speakerTag');
    const textBox = $('dialogueTextBox');
    const content = $('dialogueContent');
    const prompt = $('clickPrompt');

    tag.textContent = speaker;
    tag.className = 'speaker-tag ' + tagClass;
    textBox.className = 'dialogue-text-box ' + borderClass;
    content.textContent = '';
    prompt.style.visibility = 'hidden';
    box.classList.add('visible');

    currentFullText = text;
    isTyping = true;
    await typewriter(content, text, 25);
    isTyping = false;

    if (skipAll) return;
    prompt.style.visibility = 'visible';
    await waitForClick();
    prompt.style.visibility = 'hidden';
  }

  // ── Objection flash ──
  function flashObjection(color) {
    if (skipAll) return Promise.resolve();
    return new Promise(resolve => {
      const ov = $('objectionOverlay');
      const txt = $('objectionText');
      const stage = $('stage');

      txt.className = 'objection-text ' + color;
      ov.classList.remove('flash');

      // Force reflow
      void ov.offsetWidth;
      ov.classList.add('flash');

      // Screen shake
      stage.classList.add('shake');
      setTimeout(() => stage.classList.remove('shake'), 400);

      setTimeout(() => {
        ov.classList.remove('flash');
        resolve();
      }, 750);
    });
  }

  // ── Slide characters ──
  function slideIn(who) {
    $(who + 'Char').classList.add('on-stage');
  }
  function slideOut(who) {
    $(who + 'Char').classList.remove('on-stage');
  }

  // ── Sleep helper (respects skip) ──
  const sleep = ms => skipAll ? Promise.resolve() : new Promise(r => setTimeout(r, ms));

  // ── Main trial ──
  async function runTrial(ticker) {
    // Reset everything
    skipAll = false;
    $('welcome').style.display = 'none';
    $('errorMsg').classList.remove('visible');
    $('verdictOverlay').classList.remove('visible');
    $('verdictCard').classList.remove('show', 'buy', 'hold', 'avoid');
    $('dialogueBox').classList.remove('visible');
    $('skipBtn').classList.remove('visible');
    slideOut('prosecutor');
    slideOut('defense');
    $('overlay').classList.add('active');

    const prosecutorPrompt = `You are a ruthless prosecuting attorney in a stock investment trial. The stock on trial is ${ticker}. Argue aggressively why this is a BAD investment. Cover: overvaluation, risks, competition, macro threats, red flags. Be dramatic and punchy. Return exactly 4 short punchy argument points as a JSON array of strings. No markdown, just raw JSON array.`;
    const defensePrompt = `You are a passionate defense attorney fighting for the investment case of ${ticker}. Argue why this is a GREAT investment. Cover: growth runway, competitive moat, catalysts, financials, market position. Be enthusiastic and compelling. Return exactly 4 short punchy argument points as a JSON array of strings. No markdown, just raw JSON array.`;
    const judgePrompt = `You are a wise and neutral judge presiding over the investment trial of ${ticker}. You have heard both sides. Deliver your verdict. Return a JSON object with exactly these fields:\n{\n  "verdict": "BUY" | "HOLD" | "AVOID",\n  "risk": "LOW" | "MEDIUM" | "HIGH",\n  "summary": "2 sentence neutral summary of the overall case",\n  "gavel_quote": "One dramatic judge quote to close the trial, max 12 words"\n}\nNo markdown, raw JSON only.`;

    try {
      const [prosecutorRaw, defenseRaw, judgeRaw] = await Promise.all([
        askGemini(prosecutorPrompt),
        askGemini(defensePrompt),
        askGemini(judgePrompt)
      ]);

      let pArgs, dArgs, judgeData;
      try { pArgs = safeParse(prosecutorRaw); } catch { pArgs = [prosecutorRaw]; }
      try { dArgs = safeParse(defenseRaw); }    catch { dArgs = [defenseRaw]; }
      try { judgeData = safeParse(judgeRaw); }  catch {
        judgeData = { verdict: 'HOLD', risk: 'MEDIUM', summary: judgeRaw, gavel_quote: 'The court has spoken.' };
      }

      if (!Array.isArray(pArgs)) pArgs = [String(pArgs)];
      if (!Array.isArray(dArgs)) dArgs = [String(dArgs)];

      $('overlay').classList.remove('active');
      $('skipBtn').classList.add('visible');
      await sleep(300);

      // ── ACE ATTORNEY DIALOGUE SEQUENCE ──

      // Prosecutor opening
      slideIn('prosecutor');
      await sleep(500);
      await showDialogue(
        'PROSECUTOR',
        `Your Honor, the people will prove beyond doubt that ${ticker} is a DANGEROUS investment!`,
        'prosecution-border',
        'prosecution'
      );

      // Prosecutor argument #1
      await showDialogue('PROSECUTOR', pArgs[0], 'prosecution-border', 'prosecution');
      slideOut('prosecutor');
      await sleep(400);

      // Defense OBJECTS to #1
      await flashObjection('blue');
      slideIn('defense');
      await sleep(300);
      await showDialogue('DEFENSE', dArgs[0], 'defense-border', 'defense-tag');
      slideOut('defense');
      await sleep(400);

      // Prosecutor OBJECTS back for #2
      await flashObjection('red');
      slideIn('prosecutor');
      await sleep(300);
      await showDialogue('PROSECUTOR', pArgs[1], 'prosecution-border', 'prosecution');
      slideOut('prosecutor');
      await sleep(400);

      // Defense OBJECTS for #2
      await flashObjection('blue');
      slideIn('defense');
      await sleep(300);
      await showDialogue('DEFENSE', dArgs[1], 'defense-border', 'defense-tag');
      slideOut('defense');
      await sleep(400);

      // Prosecutor OBJECTS for #3
      await flashObjection('red');
      slideIn('prosecutor');
      await sleep(300);
      await showDialogue('PROSECUTOR', pArgs[2] || 'The evidence speaks for itself!', 'prosecution-border', 'prosecution');
      slideOut('prosecutor');
      await sleep(400);

      // Defense OBJECTS for #3
      await flashObjection('blue');
      slideIn('defense');
      await sleep(300);
      await showDialogue('DEFENSE', dArgs[2] || 'The future is bright for this stock!', 'defense-border', 'defense-tag');
      slideOut('defense');
      await sleep(400);

      // Prosecutor final blow #4
      await flashObjection('red');
      slideIn('prosecutor');
      await sleep(300);
      await showDialogue('PROSECUTOR', pArgs[3] || 'I rest my case, Your Honor!', 'prosecution-border', 'prosecution');
      slideOut('prosecutor');
      await sleep(400);

      // Defense final rebuttal #4
      await flashObjection('blue');
      slideIn('defense');
      await sleep(300);
      await showDialogue('DEFENSE', dArgs[3] || 'The defense rests!', 'defense-border', 'defense-tag');
      slideOut('defense');
      await sleep(500);

      // ── JUDGE VERDICT ──
      $('skipBtn').classList.remove('visible');
      $('dialogueBox').classList.remove('visible');
      $('objectionOverlay').classList.remove('flash');
      slideOut('prosecutor');
      slideOut('defense');
      await sleep(skipAll ? 100 : 600);

      // Show verdict overlay
      const card = $('verdictCard');
      const v = (judgeData.verdict || 'HOLD').toUpperCase();
      const r = (judgeData.risk || 'MEDIUM').toUpperCase();

      $('verdictText').textContent = v;
      if (v === 'BUY')       card.classList.add('buy');
      else if (v === 'AVOID') card.classList.add('avoid');
      else                    card.classList.add('hold');

      const riskBadge = $('riskBadge');
      riskBadge.textContent = `RISK: ${r}`;
      riskBadge.className = 'risk-badge';
      if (r === 'LOW')       riskBadge.classList.add('risk-low');
      else if (r === 'HIGH') riskBadge.classList.add('risk-high');
      else                   riskBadge.classList.add('risk-medium');

      $('summaryText').textContent = judgeData.summary || '';
      $('gavelQuote').textContent = '';

      $('verdictOverlay').classList.add('visible');
      await sleep(200);
      card.classList.add('show');
      await sleep(700);

      // Typewriter on gavel quote
      await typewriter($('gavelQuote'), judgeData.gavel_quote || 'The court has spoken.');

    } catch (err) {
      $('overlay').classList.remove('active');
      $('errorMsg').classList.add('visible');
      $('errorDetail').textContent = err.message || 'Something went wrong. Try again.';
    }
  }

  // ── Events ──
  $('submitBtn').addEventListener('click', e => {
    e.stopPropagation(); // Don't trigger dialogue advance
    const ticker = $('tickerInput').value.trim().toUpperCase();
    if (!ticker) { $('tickerInput').focus(); return; }
    runTrial(ticker);
  });

  $('tickerInput').addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') $('submitBtn').click();
  });

  $('skipBtn').addEventListener('click', e => {
    e.stopPropagation();
    skipAll = true;
    // Immediately resolve any pending dialogue wait
    if (dialogueResolve) {
      const r = dialogueResolve;
      dialogueResolve = null;
      r();
    }
    // Also force-finish any typewriter in progress
    if (isTyping) {
      isTyping = false;
      $('dialogueContent').textContent = currentFullText;
    }
  });

  $('restartBtn').addEventListener('click', e => {
    e.stopPropagation();
    $('verdictOverlay').classList.remove('visible');
    $('verdictCard').classList.remove('show', 'buy', 'hold', 'avoid');
    $('welcome').style.display = '';
    $('tickerInput').value = '';
    $('tickerInput').focus();
  });
</script>
</body>
</html>
